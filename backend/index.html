
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Academic Assistant</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
  height:100vh;
  display:flex;
  background:#0b1220;
  color:white;
}

.sidebar {
  width:280px;
  background:#111827;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.upload {
  background:#2563eb;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

input[type=file] { display:none; }

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.msg {
  max-width:70%;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.user { background:#2563eb; align-self:flex-end; }
.bot { background:#1f2937; align-self:flex-start; }

.input-box {
  display:flex;
  padding:10px;
}

.input-box input {
  flex:1;
  padding:10px;
}

.input-box button {
  padding:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Smart Assistant</h3>

  <label class="upload">
    Upload PDF
    <input type="file" id="fileInput" onchange="uploadPDF()">
  </label>

  <div id="status">No file</div>
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-box">
    <input id="question" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

let docId = null;

/* UPLOAD */
async function uploadPDF() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return;

  let formData = new FormData();
  formData.append("file", file);

  document.getElementById("status").innerText = "Uploading...";

  const res = await fetch("http://127.0.0.1:5000/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  docId = data.doc_id;

  document.getElementById("status").innerText = "Loaded: " + file.name;

  addMsg("Uploaded ✔", "bot");
}

/* CHAT */
async function sendMessage() {
  const input = document.getElementById("question");
  const text = input.value.trim();

  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  addMsg("Thinking...", "bot");

  const res = await fetch("http://127.0.0.1:5000/ask", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      doc_id: docId,
      question: text
    })
  });

  const data = await res.json();

  removeLastBot();
  addMsg(data.response || data.error, "bot");
}

/* UI */
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
}

function removeLastBot() {
  const bots = document.querySelectorAll(".msg.bot");
  if (bots.length) bots[bots.length - 1].remove();
}
</script>

</body>
</html>
